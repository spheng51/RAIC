name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ops_drift:
    name: Ops Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Branch and ref context
        run: |
          echo "[ci] event=${{ github.event_name }}"
          echo "[ci] ref=${{ github.ref }}"
          echo "[ci] ref_name=${{ github.ref_name }}"
          echo "[ci] head_ref=${{ github.head_ref || 'n/a' }}"
          echo "[ci] base_ref=${{ github.base_ref || 'n/a' }}"

      - name: Ops drift check
        run: pnpm run ops:drift:ci

      - name: Secrets scan
        run: pnpm run secrets:scan

  mirofish_contract:
    name: MiroFish Contract Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: MiroFish contract gate
        run: pnpm test:mirofish:gate

  check:
    name: Lint, Typecheck & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prettier
        run: pnpm check

      - name: ESLint
        run: pnpm lint

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Unit Tests
        run: pnpm test

      - name: JSON fallback lock regression
        run: pnpm exec vitest run tests/server/db-client.test.ts

      - name: Server test slice
        run: pnpm exec vitest run tests/server

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Run e2e tests
        run: pnpm exec playwright test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
